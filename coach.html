<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>Spaced Repetition Coach · Business English</title>
  
  <!-- Fonts (gleich wie Hub) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  
  <!-- Hub CSS -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/weeks.css">
  <link rel="stylesheet" href="css/modals.css">
  <link rel="stylesheet" href="css/coach.css">
</head>

<body>
  <!-- Navigation (gleich wie Hub) -->
  <nav class="nav">
    <div class="nav-inner">
      <div class="nav-brand">BE <span>4W</span></div>
      <div class="nav-links">
        <button class="nav-link" onclick="window.location.href='index.html#week-0'">Woche 1</button>
        <button class="nav-link" onclick="window.location.href='index.html#week-1'">Woche 2</button>
        <button class="nav-link" onclick="window.location.href='index.html#week-2'">Woche 3</button>
        <button class="nav-link" onclick="window.location.href='index.html#week-3'">Woche 4</button>
        <button class="nav-link" onclick="window.location.href='index.html#week-4'">Bonus</button>
      </div>
      <!-- User Code Badge (gleich wie im Hub) -->
      <div style="display:flex;align-items:center;gap:7px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:8px;padding:5px 11px;">
        <span style="width:8px;height:8px;border-radius:50%;background:#fbbf24;"></span>
        <span id="coachUserCode" style="font-size:12px;color:rgba(255,255,255,0.7);">–</span>
      </div>
    </div>
  </nav>
  
  <!-- Coach Content -->
  <div class="coach-wrapper">
    <div id="app"></div>
  </div>
  
  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay" onclick="if(event.target === this) closeModal()">
    <div class="modal">
      <div id="modalContent"></div>
    </div>
  </div>
  
  <!-- PapaParse -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  
  <!-- Coach JS -->
  <script src="js/coach.js"></script>

</html>
