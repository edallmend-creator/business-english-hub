<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>Spaced Repetition Coach · Business English</title>
  
  <!-- Fonts (gleich wie Hub) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  
  <!-- Hub CSS -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/weeks.css">
  <link rel="stylesheet" href="css/modals.css">
  <link rel="stylesheet" href="css/coach.css">

</head>

<body>
  <!-- Navigation (gleich wie Hub) -->
  <nav class="nav">
    <div class="nav-inner">
      <div class="nav-row-1">
        <a class="nav-brand" href="start.html">BE <span>4W</span></a>
        <div class="nav-links nav-links-desktop">
          <button class="nav-link" onclick="window.location.href='index.html#week-1'">Woche 1</button>
          <button class="nav-link" onclick="window.location.href='index.html#week-2'">Woche 2</button>
          <button class="nav-link" onclick="window.location.href='index.html#week-3'">Woche 3</button>
          <button class="nav-link" onclick="window.location.href='index.html#week-4'">Woche 4</button>
          <button class="nav-link" onclick="window.location.href='index.html#week-bonus'">Bonus</button>
        </div>
      </div>
      <!-- User Code Badge (gleich wie im Hub) -->
      <div class="nav-row-2">
        <div class="nav-code-btn">
          <span class="nav-sync-dot"></span>
          <span id="coachUserCode" class="nav-code-display">–</span>
        </div>
      </div>
    </div>
  </nav>
  
  <!-- Coach Content -->
  <div class="coach-wrapper">
    <div id="app"></div>
  </div>
  
  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay" onclick="if(event.target === this) { exitCoach(); }">
    <div class="modal">
      <div id="modalContent"></div>
    </div>
  </div>
  
  <!-- PapaParse -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  
  <!-- Coach JS - Now Modular -->
  <script src="js/coach-srs.js"></script>      <!-- SRS & Learning Logic -->
  <script src="js/coach-sync.js"></script>    <!-- Data Sync & Storage -->
  <script src="js/coach-ui.js"></script>      <!-- UI Rendering -->
  <script src="js/coach.js"></script>         <!-- Main Coach Logic -->
</body>
</html>
