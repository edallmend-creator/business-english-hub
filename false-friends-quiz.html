<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>False Friends Quiz - Business English in 4 Wochen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 40px 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #DC3545, #FF9500, #FFC107, #28A745);
            transition: width 0.3s ease;
        }

        .progress-text {
            text-align: center;
            font-size: 12px;
            color: #999;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .question-section {
            margin-bottom: 30px;
        }

        .german-word {
            font-size: 28px;
            font-weight: 700;
            color: #DC3545;
            margin-bottom: 10px;
            font-style: italic;
        }

        .question-text {
            font-size: 12px;
            text-transform: uppercase;
            color: #999;
            letter-spacing: 0.5px;
            margin-bottom: 20px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option {
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            background: white;
        }

        .option:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .option.selected {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .option.correct {
            border-color: #28A745;
            background: #e8f5e9;
            color: #1b5e20;
        }

        .option.incorrect {
            border-color: #DC3545;
            background: #ffebee;
            color: #b71c1c;
        }

        .option.disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .option-letter {
            font-weight: 700;
            margin-right: 8px;
        }

        .feedback {
            margin-top: 20px;
            padding: 16px;
            border-radius: 8px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .feedback.show {
            display: block;
        }

        .feedback.correct {
            background: #e8f5e9;
            border-left: 4px solid #28A745;
            color: #1b5e20;
        }

        .feedback.incorrect {
            background: #ffebee;
            border-left: 4px solid #DC3545;
            color: #b71c1c;
        }

        .feedback-title {
            font-weight: 700;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .feedback-text {
            font-size: 13px;
            line-height: 1.5;
        }

        .explanation {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid currentColor;
            opacity: 0.9;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 24px;
        }

        .btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .summary {
            text-align: center;
            padding: 40px 20px;
        }

        .summary-score {
            font-size: 48px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 16px;
        }

        .summary-text {
            font-size: 18px;
            color: #666;
            margin-bottom: 24px;
        }

        .summary-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .summary-stat {
            padding: 16px;
            background: #f5f5f5;
            border-radius: 8px;
        }

        .summary-stat-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .summary-stat-value {
            font-size: 24px;
            font-weight: 700;
        }

        .summary-stat.correct .summary-stat-value {
            color: #28A745;
        }

        .summary-stat.incorrect .summary-stat-value {
            color: #DC3545;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .back-button {
            color: white;
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 20px;
            display: inline-block;
            opacity: 0.9;
            transition: opacity 0.2s;
        }

        .back-button:hover {
            opacity: 1;
        }

        @media (max-width: 600px) {
            .card {
                padding: 24px 16px;
            }

            .german-word {
                font-size: 24px;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html#week-0" class="back-button">← Zurück</a>

        <div class="header">
            <h1>🎮 False Friends Quiz</h1>
            <p>Lerne die Unterschiede zu erkennen</p>
        </div>

        <div class="card" id="quizCard">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text">
                Frage <span id="currentQuestion">1</span> von <span id="totalQuestions">30</span>
            </div>

            <div class="question-section">
                <div class="question-text">Was ist die korrekte englische Übersetzung?</div>
                <div class="german-word" id="germanWord">aktuell</div>
            </div>

            <div class="options" id="optionsContainer"></div>

            <div class="feedback" id="feedback"></div>

            <div class="button-group">
                <button class="btn btn-primary" id="submitBtn" onclick="checkAnswer()">Antwort Prüfen</button>
            </div>
        </div>

        <div id="summaryCard" style="display: none;">
            <div class="card summary">
                <div class="summary-score" id="finalScore">100%</div>
                <div class="summary-text" id="summaryText">Großartig gemacht!</div>
                
                <div class="summary-details">
                    <div class="summary-stat correct">
                        <div class="summary-stat-label">Richtig</div>
                        <div class="summary-stat-value" id="correctCount">0</div>
                    </div>
                    <div class="summary-stat incorrect">
                        <div class="summary-stat-label">Falsch</div>
                        <div class="summary-stat-value" id="incorrectCount">0</div>
                    </div>
                </div>

                <button class="btn btn-primary" onclick="restartQuiz()" style="margin-top: 24px;">Quiz Neustarten</button>
                <button class="btn btn-secondary" onclick="window.location.href='index.html#week-0'" style="margin-top: 10px;">Zurück zum Hub</button>
            </div>
        </div>
    </div>

    <script>
        // False Friends Daten
        const falseFriends = [
            { word: "aktuell", correct: "currently", wrong: "actually", explanation: "Nicht mit 'actually' verwechseln, das 'eigentlich' bedeutet." },
            { word: "eventuell", correct: "possibly", wrong: "eventually", explanation: "'Eventually' bedeutet 'schließlich', nicht 'eventuell'." },
            { word: "sensibel", correct: "sensitive", wrong: "sensible", explanation: "'Sensible' bedeutet 'vernünftig', nicht 'sensibel'." },
            { word: "bekommen", correct: "get", wrong: "become", explanation: "'Become' bedeutet 'werden', nicht 'bekommen'." },
            { word: "kontrollieren", correct: "check", wrong: "control", explanation: "'Control' bedeutet 'steuern/kontrollieren' allgemein, aber im Sinne von 'überprüfen' ist 'check' besser." },
            { word: "realisieren", correct: "implement", wrong: "realize", explanation: "'Realize' bedeutet 'erkennen', nicht 'umsetzen'." },
            { word: "Chef", correct: "boss", wrong: "chief", explanation: "'Chief' ist ein Titel, kein allgemeiner Vorgesetzter." },
            { word: "Handy", correct: "mobile phone", wrong: "handy", explanation: "'Handy' im Englischen bedeutet 'praktisch', nicht das Gerät." },
            { word: "erinnern", correct: "remind", wrong: "remember", explanation: "'Remember' ist 'sich erinnern', 'remind' ist 'jemanden erinnern'." },
            { word: "Bewerber", correct: "applicant", wrong: "candidate", explanation: "'Applicant' ist der Bewerber bei einer Bewerbung." },
            { word: "Beleg", correct: "receipt", wrong: "recite", explanation: "'Receipt' ist die Quittung/der Beleg." },
            { word: "bewahren", correct: "preserve", wrong: "behave", explanation: "'Preserve' bedeutet 'bewahren/konservieren', nicht 'benehmen'." },
            { word: "berechtigt", correct: "authorized", wrong: "right", explanation: "'Authorized' bedeutet 'berechtigt/ermächtigt'." },
            { word: "bekräftigen", correct: "confirm", wrong: "strengthen", explanation: "'Confirm' bedeutet 'bestätigen/bekräftigen'." },
            { word: "Beziehung", correct: "relationship", wrong: "reference", explanation: "'Relationship' bedeutet 'Beziehung/Verhältnis' in allen Kontexten." },
            { word: "Dauer", correct: "duration", wrong: "lasting", explanation: "'Duration' bedeutet 'Dauer/Zeitraum'." },
            { word: "Erfolg", correct: "success", wrong: "result", explanation: "'Success' ist der Erfolg (Noun), 'successful' ist erfolgreich (Adjektiv)." },
            { word: "Fabrik", correct: "factory", wrong: "fabric", explanation: "'Factory' ist die Fabrik, 'fabric' ist das Material/der Stoff." },
            { word: "konsequent", correct: "consistent", wrong: "consequent", explanation: "'Consistent' bedeutet 'konsequent/beständig'." },
            { word: "sympathisch", correct: "likeable", wrong: "sympathetic", explanation: "'Sympathetic' bedeutet 'mitfühlend', nicht 'sympathisch'." },
            { word: "beeinflussen", correct: "influence", wrong: "affect", explanation: "'Influence' bedeutet 'beeinflussen/Einfluss haben'." },
            { word: "befestigen", correct: "attach", wrong: "fix", explanation: "'Attach' bedeutet 'befestigen/anbringen', nicht 'reparieren'." },
            { word: "aktiv", correct: "active", wrong: "actual", explanation: "'Active' bedeutet 'aktiv/tätig', nicht 'tatsächlich'." },
            { word: "erkennen", correct: "recognize", wrong: "realize", explanation: "'Recognize' bedeutet 'wiedererkennen', nicht 'erkennen' im Sinne von 'verstehen'." },
            { word: "überwiegend", correct: "mostly", wrong: "overwhelming", explanation: "'Mostly' bedeutet 'überwiegend/hauptsächlich'." },
            { word: "äußern", correct: "express", wrong: "expose", explanation: "'Express' bedeutet 'äußern/ausdrücken'." },
            { word: "Geschwindigkeit", correct: "speed", wrong: "velocity", explanation: "'Speed' ist die Geschwindigkeit im alltäglichen Englisch." },
            { word: "Kunsthandwerk", correct: "craft", wrong: "handcraft", explanation: "'Craft' bedeutet 'Kunsthandwerk/Handwerk'." },
            { word: "Auftrag", correct: "order", wrong: "assignment", explanation: "'Order' bedeutet 'Auftrag/Bestellung'." },
            { word: "protokollieren", correct: "record", wrong: "protocol", explanation: "'Record' bedeutet 'aufzeichnen/protokollieren'." }
        ];

        let currentIndex = 0;
        let correct = 0;
        let incorrect = 0;
        let answered = false;

        function shuffle(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function loadQuestion() {
            answered = false;
            const ff = falseFriends[currentIndex];
            
            document.getElementById('germanWord').textContent = ff.word;
            document.getElementById('currentQuestion').textContent = currentIndex + 1;
            document.getElementById('totalQuestions').textContent = falseFriends.length;
            
            const progress = ((currentIndex + 1) / falseFriends.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';

            // Create options
            const options = [
                { label: ff.correct, isCorrect: true },
                { label: ff.wrong, isCorrect: false },
                { label: shuffle([ff.correct, ff.wrong])[0] + ' / ' + shuffle([ff.correct, ff.wrong])[1], isCorrect: false },
                { label: 'Ich bin mir nicht sicher', isCorrect: false }
            ];

            const shuffledOptions = shuffle(options);
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';

            shuffledOptions.forEach((opt, idx) => {
                const div = document.createElement('div');
                div.className = 'option';
                div.innerHTML = `<span class="option-letter">${String.fromCharCode(65 + idx)}.</span> ${opt.label}`;
                div.onclick = () => selectOption(div, opt);
                div.dataset.correct = opt.isCorrect;
                container.appendChild(div);
            });

            document.getElementById('feedback').innerHTML = '';
            document.getElementById('feedback').classList.remove('show', 'correct', 'incorrect');
            document.getElementById('submitBtn').textContent = 'Antwort Prüfen';
        }

        function selectOption(element, option) {
            if (answered) return;
            
            document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
            element.classList.add('selected');
            element.dataset.selected = 'true';
        }

        function checkAnswer() {
            if (answered) {
                nextQuestion();
                return;
            }

            const selected = document.querySelector('.option[data-selected="true"]');
            if (!selected) return;

            answered = true;
            const isCorrect = selected.dataset.correct === 'true';
            
            if (isCorrect) {
                correct++;
                selected.classList.add('correct');
            } else {
                incorrect++;
                selected.classList.add('incorrect');
            }

            const ff = falseFriends[currentIndex];
            const feedback = document.getElementById('feedback');
            const feedbackClass = isCorrect ? 'correct' : 'incorrect';
            const feedbackTitle = isCorrect ? '✅ Richtig!' : '❌ Nicht ganz...';

            feedback.innerHTML = `
                <div class="feedback-title">${feedbackTitle}</div>
                <div class="feedback-text">
                    <div><strong>Richtig:</strong> ${ff.correct}</div>
                    <div><strong>Falsch:</strong> ${ff.wrong}</div>
                    <div class="explanation"><strong>Warum:</strong> ${ff.explanation}</div>
                </div>
            `;
            feedback.classList.add('show', feedbackClass);

            document.getElementById('submitBtn').textContent = 'Nächste Frage';
            document.querySelectorAll('.option').forEach(opt => opt.classList.add('disabled'));
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < falseFriends.length) {
                loadQuestion();
            } else {
                showSummary();
            }
        }

        function showSummary() {
            document.getElementById('quizCard').style.display = 'none';
            document.getElementById('summaryCard').style.display = 'block';

            const percentage = Math.round((correct / falseFriends.length) * 100);
            document.getElementById('finalScore').textContent = percentage + '%';
            document.getElementById('correctCount').textContent = correct;
            document.getElementById('incorrectCount').textContent = incorrect;

            let message = '';
            if (percentage === 100) {
                message = '🌟 Perfekt! Du bist ein False Friends Meister!';
            } else if (percentage >= 80) {
                message = '🎉 Sehr gut! Du verstehst die meisten False Friends!';
            } else if (percentage >= 60) {
                message = '👍 Gute Leistung! Noch etwas Übung, dann sitzt es!';
            } else {
                message = '💪 Anfang gemacht! Wiederhole die False Friends im Coach!';
            }

            document.getElementById('summaryText').textContent = message;
        }

        function restartQuiz() {
            currentIndex = 0;
            correct = 0;
            incorrect = 0;
            document.getElementById('summaryCard').style.display = 'none';
            document.getElementById('quizCard').style.display = 'block';
            loadQuestion();
        }

        // Start
        loadQuestion();
    </script>
</body>
</html>
